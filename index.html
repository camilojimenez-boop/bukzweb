<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>BUKZ · Tu librería favorita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#F5E100;
    --soft:#F2E85C;
    --black:#272622;
    --dark:#1c1b18;
    --ink:#2a2925;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Figtree',sans-serif;background:var(--black);color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
  #app{height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;
    background:radial-gradient(42% 40% at 50% 58%, rgba(150,135,88,.50) 0%, rgba(120,108,70,.22) 35%, rgba(39,38,34,0) 72%),
               radial-gradient(60% 58% at 50% 55%, rgba(95,86,58,.30) 0%, rgba(39,38,34,0) 75%),
               var(--black);
    transition:background 1s ease;animation:appShow 1.1s cubic-bezier(.2,.7,.2,1) both;}
  #app.chat-mode{background:radial-gradient(55% 42% at 50% 16%, rgba(120,108,70,.12) 0%, rgba(39,38,34,0) 72%), var(--black);}
  ::-webkit-scrollbar{width:7px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}

  /* ── Switch a bukz.co ── */
  .switch{position:absolute;top:20px;right:22px;z-index:30;display:flex;align-items:center;gap:10px;cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);padding:6px 8px 6px 15px;border-radius:999px;text-decoration:none;transition:all .18s ease;}
  .switch:hover{background:rgba(255,255,255,.08);border-color:rgba(242,232,92,.4)}
  .switch .lbl{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.72);letter-spacing:.2px}
  .switch .track{width:40px;height:22px;border-radius:999px;background:rgba(255,255,255,.14);position:relative;transition:background .25s ease;flex:none}
  .switch:hover .track{background:var(--soft)}
  .switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s cubic-bezier(.2,.7,.2,1)}
  .switch:hover .knob{transform:translateX(18px)}

  /* ── HERO (igual al mockup) ── */
  #hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .hero-wrap{width:100%;max-width:360px}
  .greeting{color:rgba(140,137,128,1);font-size:19px;font-weight:400;letter-spacing:.2px;margin:0 0 16px 4px}
  .hero-bar{display:flex;align-items:center;height:58px;padding:0 26px;border-radius:999px;
    background:linear-gradient(180deg,#F6EA60 0%,#EEE157 100%);
    box-shadow:0 0 80px 8px rgba(240,225,90,.22), 0 10px 34px rgba(0,0,0,.30);}
  .hero-bar input{flex:1;min-width:0;background:transparent;border:none;outline:none;font-family:'Figtree',sans-serif;font-size:17px;color:#3a382f}
  .hero-bar input::placeholder{color:rgba(58,56,47,.5)}
  .hero-logo{display:flex;justify-content:flex-end;margin-top:14px}
  .logo{height:30px;width:auto;display:block;user-select:none}

  /* ── CHAT ── */
  #chat{flex:1;display:none;flex-direction:column;min-height:0}
  #app.chat-mode #hero{display:none}
  #app.chat-mode #chat{display:flex}
  .chat-head{display:flex;align-items:center;justify-content:flex-start;gap:14px;padding:18px 26px;}
  .ghost-btn{background:transparent;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.6);border-radius:999px;padding:7px 15px;font-size:12.5px;font-family:'Figtree',sans-serif;font-weight:500;cursor:pointer;transition:all .15s ease}
  .ghost-btn:hover{border-color:rgba(255,255,255,.3);color:#fff}
  .chat-scroll{flex:1;overflow-y:auto;padding:8px 26px 8px}
  .thread{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:26px}
  .msg-user{align-self:flex-end;max-width:80%}
  .msg-user .bubble{background:var(--soft);color:#3a382f;border-radius:20px 20px 6px 20px;padding:11px 18px;font-size:15px;font-weight:500;line-height:1.4}
  .msg-bot{align-self:flex-start;width:100%}
  .msg-bot .txt{color:rgba(255,255,255,.82);font-size:15.5px;line-height:1.55;font-weight:400;max-width:80%}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:18px;margin-top:18px}
  .chips{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}
  .chip{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:999px;padding:8px 16px;font-family:'Figtree',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .16s ease}
  .chip:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.32);color:#fff}

  /* ── Tarjeta (limpia, suave) ── */
  .card{display:flex;flex-direction:column;gap:13px;height:100%;text-decoration:none;background:#fff;border-radius:16px;padding:14px;
    box-shadow:0 6px 26px rgba(0,0,0,.22);transition:transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease;}
  .card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.32)}
  .cover{aspect-ratio:3/4;border-radius:11px;padding:15px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.14)}
  .cover .mark{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--soft);opacity:.9}
  .cover .ctitle{font-size:17px;font-weight:600;line-height:1.15;color:#fff;letter-spacing:.1px}
  .cover .cauthor{font-size:11.5px;font-weight:400;color:rgba(255,255,255,.72);margin-top:6px}
  .meta{display:flex;flex-direction:column;gap:9px;padding:0 3px 3px}
  .meta .cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;color:#a3a299}
  .meta .foot{display:flex;align-items:center;justify-content:space-between}
  .meta .price{font-size:17px;font-weight:600;color:var(--ink)}
  .meta .link{font-size:13px;font-weight:600;color:#86857c;transition:color .15s ease}
  .card:hover .link{color:var(--ink)}

  /* ── Barra de chat (oscura, minimal) ── */
  .chat-footer{padding:14px 26px 22px}
  .chat-bar-wrap{width:100%;max-width:720px;margin:0 auto}
  .chat-bar{display:flex;align-items:center;height:54px;padding:0 6px 0 22px;border-radius:999px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);transition:border-color .18s ease;}
  .chat-bar:focus-within{border-color:rgba(242,232,92,.45)}
  .chat-bar input{flex:1;min-width:0;background:transparent;border:none;outline:none;font-family:'Figtree',sans-serif;font-size:15.5px;color:#fff}
  .chat-bar input::placeholder{color:rgba(255,255,255,.38)}
  .send{background:var(--soft);color:var(--black);border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex:none;transition:transform .14s ease}
  .send:hover{transform:scale(1.07)}

  /* ── Loading ── */
  .sk{border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:13px;background:rgba(255,255,255,.04)}
  .shimmer{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.10) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .dots::after{content:"…";animation:blink 1.3s infinite}
  @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .rise{animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fade{animation:fade .4s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .pop{animation:pop .45s cubic-bezier(.2,.7,.2,1) both}

  /* Entrada de la página: aparece desde un blur suave */
  @keyframes appShow{from{opacity:0;filter:blur(16px)}to{opacity:1;filter:blur(0)}}

  /* Intro splash con el logo */
  #intro{position:absolute;inset:0;z-index:24;display:flex;align-items:center;justify-content:center;pointer-events:none;animation:introOut .7s ease 1.45s forwards}
  .intro-logo{height:66px;width:auto;animation:introZoom 1.5s cubic-bezier(.2,.7,.2,1) both}
  @keyframes introZoom{from{transform:scale(.93)}to{transform:scale(1)}}
  @keyframes introOut{to{opacity:0;visibility:hidden}}

  @media (prefers-reduced-motion:reduce){#app{animation:none}.rise,.fade,.pop,.intro-logo{animation:none}#intro{display:none}.greeting,.hero-wrap>div{animation-delay:0ms!important}}

  @media (max-width:520px){
    .grid{grid-template-columns:repeat(2,1fr);gap:12px}
    .switch .lbl{display:none}
    .chat-scroll,.chat-footer,.chat-head{padding-left:16px;padding-right:16px}
  }
</style>
</head>
<body>
<div id="app">

  <a class="switch" id="siteSwitch" href="#" role="switch" aria-checked="false" aria-label="Ir a la tienda bukz.co">
    <span class="lbl">Ir a bukz.co</span>
    <span class="track"><span class="knob"></span></span>
  </a>

  <!-- Intro: el logo aparece primero -->
  <div id="intro"><img class="intro-logo" id="logoIntro" alt="BUKZ" /></div>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-wrap">
      <p class="greeting rise" style="animation-delay:1650ms">Bienvenido a tu librería favorita</p>
      <div class="rise" style="animation-delay:2000ms">
        <div class="hero-bar"><input id="heroInput" type="text" autocomplete="off" placeholder="¿Qué libro se te antoja hoy?" /></div>
      </div>
      <div class="hero-logo rise" style="animation-delay:2250ms"><img class="logo" id="logoHero" alt="BUKZ" /></div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chat">
    <div class="chat-head">
      <button class="ghost-btn" id="resetBtn">← Nueva búsqueda</button>
      <img class="logo" id="logoChat" alt="BUKZ" style="height:24px" />
    </div>
    <div class="chat-scroll" id="scroll"><div class="thread" id="thread"></div></div>
    <div class="chat-footer">
      <div class="chat-bar-wrap">
        <div class="chat-bar">
          <input id="chatInput" type="text" autocomplete="off" placeholder="¿Qué libro se te antoja hoy?" />
          <button class="send" id="sendBtn" aria-label="Buscar">&rarr;</button>
        </div>
      </div>
    </div>
  </section>
</div>

const fmtCOP = n => "$" + n.toLocaleString("es-CO", { maximumFractionDigits:0 });
const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

function localSearch(query){
  const q = norm(query);
  const words = q.split(/[^a-z0-9]+/).filter(w => w.length > 2);
  let intentReply = "Mira lo que encontré para ti:";
  let priceSort = false, filterCat = null;

  if(/(terror|miedo|horror|escalofri|oscur)/.test(q)){ filterCat="terror"; intentReply="Si te late el terror, estas te van a encantar:"; }
  else if(/(regalo|regalar|obsequio|cumple)/.test(q)){ intentReply="Para regalar, estas son apuestas seguras:"; }
  else if(/(colombian|colombia|nacional)/.test(q)){ filterCat="novela colombiana"; intentReply="Talento colombiano para ti:"; }
  else if(/(clasic|imprescindible|fundament)/.test(q)){ filterCat="clasicos"; intentReply="Clásicos que no fallan:"; }
  else if(/(barat|economic|precio|menos de|asequible)/.test(q)){ priceSort=true; intentReply="Las opciones más económicas primero:"; }
  else if(/(reciente|novedad|nuevo|contemporane)/.test(q)){ intentReply="Lo más fresco del catálogo:"; }

  const giftIds = ["13","14","1","10"];
  const scored = CATALOG.map(b => {
    const hay = norm(b.titulo+" "+b.autor+" "+b.cat+" "+b.desc);
    let score = 0;
    words.forEach(w => {
      if(norm(b.titulo).includes(w)) score += 6;
      if(norm(b.autor).includes(w))  score += 5;
      if(norm(b.cat).includes(w))    score += 4;
      if(hay.includes(w))            score += 2;
    });
    if(filterCat && norm(b.cat).includes(filterCat)) score += 8;
    if(/(regalo|regalar|obsequio|cumple)/.test(q) && giftIds.includes(b.id)) score += 6;
    return { b, score };
  });

  let hits = scored.filter(x => x.score > 0).sort((a,c) => c.score - a.score);
  let books = hits.map(x => x.b);
  if(priceSort) books = books.slice().sort((a,c)=>a.precio-c.precio);
  books = books.slice(0,6);

  let suggestions = [];
  if(books.length){
    const cats = [...new Set(books.map(b=>b.cat))];
    suggestions = ["Más económicos", "Solo colombianos"];
    if(!cats.includes("Terror")) suggestions.push("Algo de terror");
    suggestions = suggestions.slice(0,3);
  }

  if(books.length === 0){
    const destacados = ["1","5","3","15"].map(id => CATALOG.find(b => b.id === id)).filter(Boolean);
    return { reply:"No encontré algo exacto con eso, pero échale un ojo a estos que siempre gustan:", books:destacados, suggestions:["Terror latinoamericano","Clásicos imprescindibles","Algo para regalar"] };
  }
  return { reply: intentReply, books, suggestions };
}

async function aiSearch(history){
  const res = await fetch(CONFIG.CHAT_ENDPOINT, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ messages: history }) });
  const data = await res.json();
  const books = (data.bookIds||[]).map(id => CATALOG.find(b => b.id === String(id))).filter(Boolean);
  return { reply: data.reply, books, suggestions: data.suggestions || [] };
}

const app = document.getElementById('app');
const thread = document.getElementById('thread');
const scroll = document.getElementById('scroll');
const heroInput = document.getElementById('heroInput');
const chatInput = document.getElementById('chatInput');
let history = [];
let busy = false;

document.getElementById('siteSwitch').addEventListener('click', e => { e.preventDefault(); window.location.href = CONFIG.SITE_URL; });
document.getElementById('sendBtn').addEventListener('click', () => ask(chatInput.value));
heroInput.addEventListener('keydown', e => { if(e.key==='Enter') ask(heroInput.value); });
chatInput.addEventListener('keydown', e => { if(e.key==='Enter') ask(chatInput.value); });
document.getElementById('resetBtn').addEventListener('click', () => { history=[]; thread.innerHTML=""; app.classList.remove('chat-mode'); heroInput.value=""; heroInput.focus(); });

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function cardHTML(b){
  return `<a class="card" href="${CONFIG.SITE_URL}" target="_blank" rel="noopener">
    <div class="cover" style="background:linear-gradient(160deg,${b.color} 0%,${b.color}d9 70%,${b.color}99 140%)">
      <span class="mark">BUKZ</span>
      <div><div class="ctitle">${esc(b.titulo)}</div><div class="cauthor">${esc(b.autor)}</div></div>
    </div>
    <div class="meta">
      <span class="cat">${esc(b.cat)}</span>
      <div class="foot"><span class="price">${fmtCOP(b.precio)}</span><span class="link">Ver libro →</span></div>
    </div>
  </a>`;
}

function addUser(text){ const el=document.createElement('div'); el.className='msg-user fade'; el.innerHTML=`<div class="bubble">${esc(text)}</div>`; thread.appendChild(el); toBottom(); }

function addLoading(){
  const el=document.createElement('div'); el.className='msg-bot'; el.id='loadingMsg';
  const sk='<div class="sk"><div class="shimmer" style="aspect-ratio:3/4"></div><div class="shimmer" style="height:11px;width:50%"></div><div class="shimmer" style="height:15px;width:80%"></div></div>';
  el.innerHTML=`<div class="txt" style="margin-bottom:18px"><span class="dots">Buscando en el catálogo</span></div><div class="grid">${sk.repeat(3)}</div>`;
  thread.appendChild(el); toBottom();
}

function addBot(reply, books, suggestions){
  const el=document.createElement('div'); el.className='msg-bot';
  let html=`<div class="txt fade">${esc(reply)}</div>`;
  if(books && books.length) html+=`<div class="grid">${books.map((b,i)=>`<div class="pop" style="animation-delay:${i*70}ms">${cardHTML(b)}</div>`).join("")}</div>`;
  if(suggestions && suggestions.length) html+=`<div class="chips">${suggestions.map(s=>`<button class="chip" data-q="${esc(s)}">${esc(s)}</button>`).join("")}</div>`;
  el.innerHTML=html; thread.appendChild(el);
  el.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => ask(c.dataset.q)));
  toBottom();
}

function toBottom(){ requestAnimationFrame(()=>{ scroll.scrollTop = scroll.scrollHeight; }); }

async function ask(raw){
  const q=(raw||"").trim();
  if(!q || busy) return;
  busy=true; app.classList.add('chat-mode');
  history.push({ role:"user", text:q }); addUser(q);
  heroInput.value=""; chatInput.value=""; addLoading();
  let result;
  try{
    if(CONFIG.CHAT_ENDPOINT){ result = await aiSearch(history.map(m=>({role:m.role,content:m.text}))); }
    else{ await new Promise(r=>setTimeout(r,550)); result = localSearch(q); }
  }catch(err){ result={ reply:"Uy, se me enredó la conexión. ¿Lo intentamos otra vez?", books:[], suggestions:[] }; }
  document.getElementById('loadingMsg')?.remove();
  history.push({ role:"assistant", text:result.reply });
  addBot(result.reply, result.books, result.suggestions);
  busy=false; chatInput.focus();
}

heroInput.focus();
</script>
